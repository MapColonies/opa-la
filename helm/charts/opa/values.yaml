global:
  cloudProvider: {}
  tracing: {}
  metrics: {}

podLabels: {}

mclabels:
  component: infrastructure
  owner: infra
  partOf: authentication
  prometheus:
    enabled: true
    port: 8181
  logScraping: true

cloudProvider:
  dockerRegistryUrl: my-registry-url.io
  imagePullSecretName: 'my-registry-secret'
  flavor: openshift

ca:
  enabled: false
  secretName: ''
  path: '/usr/local/share/ca-certificates'
  key: 'ca.crt'

image:
  repository: openpolicyagent/opa
  # tag: 1.0.1

enabled: true
replicaCount: 1
nodePort: 30000

servicePort: 80
targetPort: 8181
diagnosticTargetPort: 8282
logLevel: error

# Bundle persistence path (only used when s3.useAwsS3 is true)
bundlePersistencePath: /tmp/opa

additionalPodAnnotations: {}

s3:
  # For MinIO: http://minio.namespace.svc.cluster.local:9000/bucket-name
  # For AWS S3: https://s3.region.amazonaws.com/bucket-name or https://bucket-name.s3.region.amazonaws.com
  endpoint: http://localhost:9000/opa
  secretName: s3-secret
  filePath: '/dev.tar.gz'
  # Set to true for AWS S3, false for MinIO
  useAwsS3: false
  # AWS region (only used when useAwsS3 is true)
  region: us-east-1

status:
  console: false

decisionLogs:
  console: true
  maxBufferSize: 5242880 # 5MB

tracing:
  enabled: false
  type: grpc
  endpoint: localhost:4317
  # samplePercentage: 1 # Default is 100%

resources:
  enabled: true
  value:
    limits:
      cpu: 400m
      memory: 300Mi
    requests:
      cpu: 100m
      memory: 300Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75

route:
  enabled: true
  path: /
  host: 
  timeout:
    enabled: false # defaults to 30s by openshift
    duration: 60s # supported units (us, ms, s, m, h, d)
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
    useCerts: false
    certificate:
    key:
    caCertificate:

ingress:
  enabled: false
  className: ""
  labels: {}
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts: []
    # - host: opa.domain.com
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific
  path: /
  # host: 'localhost'
  # cors:
  #   enabled: true
  #   origin: '*'
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - opa.domain.com

# Add any label you want as `KEY: VALUE`
labels: {}

fluent-bit:
  enabled: true
  kind: Deployment
  test-framework:
    enabled: false
  imagePullSecrets:
    - name: my-registry-secret
  serviceAccount:
    create: false
  rbac:
    create: false
  openshift:
    enabled: true
  service:
    port: 9880
  resources:
    limits:
      cpu: 400m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 256Mi
  autoscaling:
    enabled: true
  labels:
    mapcolonies.io/environment: dev
    mapcolonies.io/component: "infrastructure"
    mapcolonies.io/part-of: "monitoring"
    mapcolonies.io/owner: "infra"
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "2020"
    prometheus.io/path: "/api/v1/metrics/prometheus"
  env:
    - name: FLUENT_LOKI_HOST
      value: "loki"
    - name: FLUENT_LOKI_PORT
      value: "3100"
  luaScripts:
    transform.lua: |
      {{ readFile "script/transform.lua" | indent 6 }}
  config:
    inputs: |
      [INPUT]
        Name         http
        Listen       0.0.0.0
        Port         9880
    filter: |
      [FILTER]
        Name         lua
        Match        *
        script       /fluent-bit/scripts/transform.lua
        call         transform_opa_log
    outputs: |
      [OUTPUT]
        Name         loki
        Match        *
        Host         ${FLUENT_LOKI_HOST}
        Port         ${FLUENT_LOKI_PORT}
        
        # LABELS: Domain added here for fast stream routing
        Labels       job=opa, environment=$env, opa_domain=$opa_domain
        
        # METADATA: Allowed moved here, along with other high-cardinality data
        Structured_metadata trace_id=$trace_id, span_id=$span_id, requested_by=$requested_by, reason=$reason, subject=$sub, total_time_ns=$total_time_ns, allowed=$allowed, token_location=$token_location, origin=$origin, user_agent=$user_agent
        
        # CLEANUP: Strip these fields from the main JSON log body
        Remove_Keys  env, domain, allowed, trace_id, span_id, requested_by, reason, sub, total_time_ns, opa_domain, token_location, origin, user_agent

