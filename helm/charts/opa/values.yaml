global:
  cloudProvider: {}
  tracing: {}
  metrics: {}
  environment: ''

environment: &environment development

cloudProvider: &cloudProvider
  dockerRegistryUrl: acrarolibotnonprod.azurecr.io
  imagePullSecretName: 'acr-registry'
  flavor: openshift

caSecretName: &caSecretName ''
caPath: &caPath '/usr/local/share/ca-certificates'
caKey: &caKey 'ca.crt'

image:
  repository: openpolicyagent/opa
  tag: 0.53.0

enabled: true
replicaCount: 2
nodePort: 30000

servicePort: 80
targetPort: 8181
diagnosticTargetPort: 8282

additionalPodAnnotations:
  {}

config:
  bundle:
    serverUrl: http://localhost:9000/opa
    filePath: /opa/bundle.tar.gz
    name: authz
    
  decisionLogs:
    enabled: true  # Enable decision logging to console

  tracing:
    enabled: true
    type: grpc
    endpoint: localhost:4317
    sample_percentage: 50

  prometheus:
    enabled: true

  # Extra configurations to inject into services, bundles, and other sections
  extraServicesConfig: |-
    external:
      url: http://external-service

  extraBundlesConfig: |-
    custom_bundle:
      service: custom
      resource: /custom/bundle.tar.gz

  extraDecisionLogsConfig: |-
    partition: true

  extraTracingConfig: |-
    options:
      retry: 3

  extraStatusConfig: |-
    healthcheck:
      enabled: true

# Additional global-level configuration outside any specific block
extraGlobalConfig: |-
  storage:
    disk:
      directory: /tmp/opa
      auto_create: true


extraConfig: |-
  storage:
    disk:
      directory: /tmp/opa
      auto_create: true

s3:
  secretName: s3-secret
  awsRegion: ' '

resources:
  enabled: true
  value:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75

route:
  enabled: true
  path: /
  timeout:
    enabled: false # defaults to 30s by openshift
    duration: 60s # supported units (us, ms, s, m, h, d)

ingress:
  enabled: false
  path: /
  host: 'localhost'
  cors:
    enabled: true
    origin: '*'
