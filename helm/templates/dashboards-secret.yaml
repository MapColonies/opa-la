{{- $releaseName := .Release.Name -}}
{{- $chartName := include "opa-la.name" . -}}
{{- if .Values.dashboards.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $releaseName }}-dashboards-secret
  labels:
    mapcolonies.io/grafana-dashboards: "true"
  annotations:
    mapcolonies.io/grafana-dashboards-folder: "infra/opa-la"
type: Opaque
stringData:
  overview.json: {{ tpl (.Files.Get "dashboards/overview.json") . | fromJson | toJson | quote }}
  bundle.json: {{ tpl (.Files.Get "dashboards/bundle.json") . | fromJson | toJson | quote }}
  performance.json: {{ tpl (.Files.Get "dashboards/performance.json") . | fromJson | toJson | quote }}
  decision.json: {{ tpl (.Files.Get "dashboards/decision.json") . | fromJson | toJson | quote }}
  analytics.json: {{ tpl (.Files.Get "dashboards/analytics.json") . | fromJson | toJson | quote }}
  opa.json: {{ tpl (.Files.Get "dashboards/opa.json") . | fromJson | toJson | quote }}
{{- end }}
