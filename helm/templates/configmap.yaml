{{- $chartName := include "opa-la.name" . -}}
{{- if .Values.authUi.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-opa-la-configmap
data:
  config.json: {{ .Values.authUi.config | quote }}
  extension.conf: |
      root   /usr/share/nginx/html;
      index  index.html index.htm;
      try_files $uri $uri/ /index.html;
{{- end }}
