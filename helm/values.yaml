global:
  cloudProvider: {}
  tracing: {}
  metrics: {}

configServerUrl: &configServerUrl 'http://localhost/api'
offlineMode: &configOfflineMode false

cloudProvider: &cloudProvider
  dockerRegistryUrl: my-registry-url.io
  imagePullSecretName: 'my-registry-secret'
  flavor: openshift

ca: &ca
  enabled: false
  secretName: 'root-ca'
  path: '/usr/local/share/ca-certificates'
  key: 'ca.crt'

host: &host ''
tls: &tls
  useCerts: false
  certificate: ''
  key: ''
  caCertificate: ''

dashboards:
  enabled: true
  values:
    np:
      openshiftUrl: https://replace-me.com
      namespace: dev
    stage:
      openshiftUrl: https://replace-me.com
      namespace: stage
    prod:
      openshiftUrl: https://replace-me.com
      namespace: prod

grafana-datasources:
  enabled: true
  team: infra
  instance: opala
  datasources:
    postgres:
      - service: opala
        host: localhost:5432
        database: auth-manager
        username: postgres
        password: postgres
opa:
  enabled: true
  cloudProvider: *cloudProvider
  ca: *ca
  image:
    repository: openpolicyagent/opa

  bundlePersistencePath: /tmp/opa

  s3:
    endpoint: http://localhost:9000/opa
    secretName: s3-secret
    filePath: '/dev.tar.gz'

  hpa:
    enabled: true

  route:
    enabled: true
    host: *host
    path: /opa
    tls: *tls

  ingress:
    enabled: false
    className: ""
    labels: {}
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts: []
      # - host: opa.domain.com
      #   paths:
      #     - path: /
      #       pathType: ImplementationSpecific
    path: /
    # host: 'localhost'
    # cors:
    #   enabled: true
    #   origin: '*'
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - opa.domain.com

auth-cron:
  enabled: true
  cloudProvider: *cloudProvider
  ca: *ca
  image:
    repository: infra/auth-cron

  configManager:
    offlineMode: *configOfflineMode
    serverUrl: *configServerUrl
    name: 'infra-auth-cron'

auth-manager:
  enabled: true
  cloudProvider: *cloudProvider
  ca: *ca
  image:
    repository: infra/auth-manager

  configManager:
    offlineMode: *configOfflineMode
    serverUrl: *configServerUrl
    name: 'infra-auth-manager'

  route:
    enabled: true
    host: *host
    path: /api
    tls: *tls

  ingress:
    enabled: false
    className: ""
    labels: {}
    annotations: {}
    hosts: []
      # - host: opa.domain.com
      #   paths:
      #     - path: /
      #       pathType: ImplementationSpecific
    path: /
    # host: 'localhost'
    # cors:
    #   enabled: true
    #   origin: '*'
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - opa.domain.com

auth-ui:
  enabled: true
  config: |
    {}
  replicaCount: 1
  cloudProvider: *cloudProvider
  mclabels:
    owner: infra
    partOf: authentication
    component: frontend
    logScraping: false
  image:
    repository: infra/auth-ui
    tag: v2.0.1 # x-release-please-version
  extraVolumes:
    - name: config
      configMap:
        name: '{{ .Release.Name }}-opa-la-configmap'
  extraVolumeMounts:
    - name: config
      mountPath: /etc/nginx/conf.d/extensions/extension.conf
      subPath: extension.conf
    - name: config
      mountPath: /usr/share/nginx/html/config.json
      subPath: config.json
  opentelemetry:
    ratio: 1
  nginx:
    extensions:
      location:
        enabled: true
        fileName: extension.conf
  authorization:
    enabled: false
  backend:
    enabled: false
  route:
    enabled: true
    host: *host
    tls: *tls

token-kiosk:
  enabled: true
  cloudProvider: *cloudProvider
  ca: *ca
  image:
    repository: infra/token-kiosk
  configManager:
    offlineMode: *configOfflineMode
    serverUrl: *configServerUrl
    name: 'infra-token-kiosk'

kiosk-ui:
  enabled: true
  replicaCount: 1
  cloudProvider: *cloudProvider
  mclabels:
    owner: infra
    partOf: authentication
    component: frontend
    logScraping: false
  image:
    repository: infra/kiosk-ui
    tag: v2.0.1 # x-release-please-version
  extraVolumes:
    - name: config
      configMap:
        name: '{{ .Release.Name }}-opa-la-configmap'
  extraVolumeMounts:
    - name: config
      mountPath: /etc/nginx/conf.d/extensions/extension.conf
      subPath: extension.conf
  opentelemetry:
    ratio: 1
  nginx:
    extensions:
      location:
        enabled: true
        fileName: extension.conf
  authorization:
    enabled: false
  backend:
    enabled: false
  route:
    enabled: true
    host: *host
    tls: *tls
